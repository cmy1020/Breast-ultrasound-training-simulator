---
# ============================================================
# Variant: UPPEROUTER
#   Breast shape: identical to BASELINE.
#   Lesion     : 12 mm (Ø) spherical nodule relocated to the
#                upper-outer quadrant (+25 mm lateral,
#                +10 mm toward the nipple). This is the most
#                clinically common lesion location.
# Usage: copy this file to ../../input_parameters.yml and run.
# ============================================================

# Experiment
tumorID: 1
num_deformations: 4

# Simulation
type: Penalty
use_gui: True
dt: 0.01
gravity: [0, 0, 0]
waittime: 0.02
alarm_distance: 0.004
contact_distance: 0.003

# Breast  -- original mesh (unchanged)
breast_volume_file: "./inData/breast_13k.msh"
breast_visual_file: "./inData/breast_5001.stl"
breast_collision_file: "./inData/breast_5001.stl"
breast_fixed_file: "./inData/fixednodes_13k.txt"

# Physical parameters
rho: 1075
material: Corotated
E: 3000
nu: 0.49

# Lesion  -- UPPEROUTER variant (new Ø12 mm nodule, offset location)
lesion_basedir: "./inData/variants/upperouter/tumor"   # resolves to inData/variants/upperouter/tumor1/Fiducial0.txt
lesion_surface_file: "./inData/variants/upperouter/lesion_nodule.stl"

# Probe
probe_visual_file: './inData/us_probe_visual.stl'
probe_collision_file: './inData/us_probe_collision.stl'
probe_velocity: 0.2
probe_initial_offset: [0.0, -0.005, 0.0]

# Input/output
save_positions: 0
save_times: 0
outdata_dir: ./outData
